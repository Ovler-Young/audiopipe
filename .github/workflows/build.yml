name: Build Binaries

on:
  push:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  features: "qwen3-asr-ggml",             gpu: cpu,    artifact: audiopipe-linux-x86_64-cpu,      ext: "",   target_dir: target }
          - { os: ubuntu-latest,  features: "qwen3-asr-ggml,vulkan-ggml", gpu: vulkan, artifact: audiopipe-linux-x86_64-vulkan,   ext: "",   target_dir: target }
          - { os: ubuntu-latest,  features: "qwen3-asr-ggml,cuda-ggml",   gpu: cuda,   artifact: audiopipe-linux-x86_64-cuda,     ext: "",   target_dir: target }
          - { os: windows-latest, features: "qwen3-asr-ggml",             gpu: cpu,    artifact: audiopipe-windows-x86_64-cpu,    ext: .exe, target_dir: C:/ct  }
          - { os: windows-latest, features: "qwen3-asr-ggml,vulkan-ggml", gpu: vulkan, artifact: audiopipe-windows-x86_64-vulkan, ext: .exe, target_dir: C:/ct  }
          - { os: windows-latest, features: "qwen3-asr-ggml,cuda-ggml",   gpu: cuda,   artifact: audiopipe-windows-x86_64-cuda,   ext: .exe, target_dir: C:/ct  }
          - { os: macos-latest,   features: "qwen3-asr-ggml",             gpu: cpu,    artifact: audiopipe-macos-aarch64-cpu,     ext: "",   target_dir: target }
          - { os: macos-latest,   features: "qwen3-asr-ggml,metal",       gpu: metal,  artifact: audiopipe-macos-aarch64-metal,   ext: "",   target_dir: target }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux' && matrix.gpu == 'vulkan'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows' && matrix.gpu == 'vulkan'
        shell: pwsh
        run: |
          $ver = "1.3.296.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait -NoNewWindow
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV

      - name: Install CUDA toolkit
        if: matrix.gpu == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.6.3'
          method: network

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.target_dir }}
          key: ${{ runner.os }}-cargo-${{ matrix.artifact }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.artifact }}-
            ${{ runner.os }}-cargo-

      - name: Cache GPU SDK
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/qwen3-asr-sys
          key: ${{ runner.os }}-qwen3-sdk-${{ matrix.gpu }}-v1

      - name: Build
        run: cargo build --release --no-default-features --features ${{ matrix.features }}
        env:
          CARGO_TARGET_DIR: ${{ matrix.target_dir }}
          GGML_CPU_ONLY: ${{ matrix.gpu == 'cpu' && '1' || '' }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv ${{ matrix.target_dir }}/release/audiopipe ${{ matrix.target_dir }}/release/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Force ${{ matrix.target_dir }}/release/audiopipe.exe ${{ matrix.target_dir }}/release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.target_dir }}/release/${{ matrix.artifact }}
          retention-days: 30
